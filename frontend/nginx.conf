server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|svg|png|gif|ico|eot|ttf|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}