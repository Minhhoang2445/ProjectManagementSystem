version: '3.8'

services:
  backend:
    image: pms-backend
    container_name: backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "5000:5000"
    depends_on:
      - database

  frontend:
    image: pms-frontend
    container_name: frontend
    restart: always
    ports:
      - "4000:80"
    
    depends_on:
      - backend

  database:
    image: postgres:15-alpine
    container_name: database
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  
volumes:
  db_data:
  
