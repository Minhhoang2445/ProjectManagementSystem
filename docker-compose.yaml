version: '3.8'

services:
  backend:
    image: nhom5doan.servebeer.com/nhom5/pms-backend:latest
    container_name: backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - database
    networks:
      - pms-network
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    image: nhom5doan.servebeer.com/nhom5/pms-frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "4000:80"
    depends_on:
      - backend
    networks:
      - pms-network
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
      restart_policy:
        condition: any

  database:
    image: postgres:15-alpine
    container_name: database
    restart: always
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - pms-network
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
networks:
  pms-network:
    driver: overlay

volumes:
  db_data:
    external: true
    name: projectmanagementsystem_db_data
  
